name: Tests

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  server-tests:
    name: Server (Jest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json
      - run: npm install
      - run: npm test
      # Fail the build on high/critical prod vulns. Moderate and below don't
      # block — fix at your cadence. --omit=dev ignores vulns in dev-only
      # packages (jest, nodemon, etc.) that can't affect production.
      - name: npm audit
        run: npm audit --omit=dev --audit-level=high

  migrations-lint:
    name: Migrations lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json
      - run: npm install
      - run: npm run lint:migrations
        env:
          DATABASE_URL: postgres://test:test@localhost:5432/test
          DATABASE_SSL: 'false'

  client-tests:
    name: Client (Vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json
      - run: npm install
      - run: npm test
      # Client has two known build-time advisories (esbuild, serialize-javascript
      # via vite-plugin-pwa) that require breaking Vite upgrades to clear.
      # Neither is reachable at runtime, so we only fail on *critical* here
      # until those are upgraded deliberately.
      - name: npm audit
        run: npm audit --omit=dev --audit-level=critical
