name: Sync Staging DB from Production

# Runs nightly at 4 AM UTC.
# Can also be triggered manually from the Actions tab (useful for on-demand refreshes).
on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

jobs:
  sync:
    name: prod -> staging
    runs-on: ubuntu-latest

    steps:
      - name: Install postgresql-client
        run: |
          sudo apt-get install -y --no-install-recommends gnupg curl
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/postgresql.gpg
          echo "deb https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17

      - name: Dump production database
        run: |
          /usr/lib/postgresql/17/bin/pg_dump "${{ secrets.PROD_DATABASE_URL }}" \
            --no-owner \
            --no-acl \
            --format=custom \
            --file=/tmp/prod.pgc

      - name: Wipe staging schema
        run: |
          /usr/lib/postgresql/17/bin/psql "${{ secrets.STAGING_DATABASE_URL }}" \
            -c "DROP SCHEMA public CASCADE; CREATE SCHEMA public;"

      - name: Restore to staging database
        run: |
          /usr/lib/postgresql/17/bin/pg_restore \
            --dbname "${{ secrets.STAGING_DATABASE_URL }}" \
            --no-owner \
            --no-acl \
            /tmp/prod.pgc

      - name: Done
        run: echo "Staging DB refreshed from production at $(date -u)"